<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة صلاح الدين الايوبي - أبا مالك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        /* تأثيرات للأزرار عند الضغط عليها في الجوال */
        .game-btn:active { transform: scale(0.98); }
        .resource-btn:active { transform: translateY(2px); }
    </style>
</head>
<body class="bg-gray-950 text-white p-5">

    <header class="text-center mb-8 bg-gray-900 p-6 rounded-2xl border border-yellow-600 shadow-2xl">
        <img src="https://img.icons8.com/color/96/castle.png" class="mx-auto mb-4" alt="Castle Icon">
        <h1 class="text-3xl font-bold text-yellow-500">مملكة صلاح الدين الايوبي</h1>
        <p class="text-gray-300">ابنِ قلعتك، واجمع جيشك، ودافع عن المملكة بروح القائد أبا مالك العقيلي.</p>
    </header>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 bg-gray-900 p-5 rounded-2xl border border-gray-700 shadow-lg">
        <div class="text-center p-4 bg-yellow-950 rounded-xl border border-yellow-800">
            <span class="text-4xl">💰</span>
            <div class="text-sm text-yellow-300">الذهب</div>
            <div id="goldCount" class="text-3xl font-bold text-yellow-100">100</div>
        </div>
        <div class="text-center p-4 bg-amber-950 rounded-xl border border-amber-800">
            <span class="text-4xl">🌲</span>
            <div class="text-sm text-amber-300">الخشب</div>
            <div id="woodCount" class="text-3xl font-bold text-amber-100">100</div>
        </div>
        <div class="text-center p-4 bg-red-950 rounded-xl border border-red-800">
            <span class="text-4xl">⚔️</span>
            <div class="text-sm text-red-300">الجيش</div>
            <div id="armyCount" class="text-3xl font-bold text-red-100">0</div>
        </div>
        <div class="text-center p-4 bg-blue-950 rounded-xl border border-blue-800">
            <span class="text-4xl">🛡️</span>
            <div class="text-sm text-blue-300">القلاع</div>
            <div id="castleCount" class="text-3xl font-bold text-blue-100">0</div>
        </div>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-lg">
            <h2 class="text-xl font-semibold mb-6 text-gray-100 text-center">جمع الموارد الأساسية</h2>
            <div class="space-y-4">
                <button onclick="collectResource('gold')" class="resource-btn w-full bg-yellow-600 text-black font-bold py-4 px-6 rounded-full text-lg shadow-md hover:bg-yellow-700 active:bg-yellow-800 transition-all flex items-center justify-center">
                    💰 جمع الذهب (+10)
                </button>
                <button onclick="collectResource('wood')" class="resource-btn w-full bg-amber-700 text-white font-bold py-4 px-6 rounded-full text-lg shadow-md hover:bg-amber-800 active:bg-amber-900 transition-all flex items-center justify-center">
                    🌲 قطع الخشب (+10)
                </button>
            </div>
        </div>

        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-lg">
            <h2 class="text-xl font-semibold mb-6 text-gray-100 text-center">بناء المملكة بروح صلاح الدين</h2>
            <div class="space-y-4">
                <button onclick="buildArmy()" class="game-btn w-full bg-red-700 text-white font-bold py-4 px-6 rounded-full text-lg shadow-lg hover:bg-red-800 active:bg-red-900 transition-all flex items-center justify-center border-2 border-red-900">
                    ⚔️ تدريب جندي (التكلفة: 💰50)
                </button>
                <button onclick="buildCastle()" class="game-btn w-full bg-blue-700 text-white font-bold py-4 px-6 rounded-full text-lg shadow-lg hover:bg-blue-800 active:bg-blue-900 transition-all flex items-center justify-center border-2 border-blue-900">
                    🛡️ بناء قلعة (التكلفة: 💰200, 🌲200)
                </button>
            </div>
        </div>
    </section>
    
    <div class="text-center mt-12 mb-8">
        <a href="index.html" class="bg-black text-yellow-500 py-3 px-8 rounded-full font-bold text-lg transition-all border-2 border-yellow-500 hover:bg-yellow-500 hover:text-black shadow-lg">
           العودة للمحفظة الرئيسية
        </a>
    </div>

    <script>
        let gold = 100;
        let wood = 100;
        let army = 0;
        let castles = 0;

        function updateDisplay() {
            document.getElementById('goldCount').innerText = gold;
            document.getElementById('woodCount').innerText = wood;
            document.getElementById('armyCount').innerText = army;
            document.getElementById('castleCount').innerText = castles;
        }

        function collectResource(type) {
            if (type === 'gold') {
                gold += 10;
            } else if (type === 'wood') {
                wood += 10;
            }
            updateDisplay();
        }

        function buildArmy() {
            if (gold >= 50) {
                gold -= 50;
                army += 1;
                updateDisplay();
            } else {
                alert("الذهب لا يكفي لتدريب الجيش. اجمع المزيد من الذهب.");
            }
        }

        function buildCastle() {
            if (gold >= 200 && wood >= 200) {
                gold -= 200;
                wood -= 200;
                castles += 1;
                updateDisplay();
            } else {
                alert("الذهب أو الخشب لا يكفي لبناء القلعة. اجمع المزيد من الموارد.");
            }
        }
    </script>
</body>
    </html>
