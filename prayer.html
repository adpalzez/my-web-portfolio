<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن المسجد - أبا مالك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #064e3b; color: white; margin: 0; padding: 0; }
        .header-gradient { background: linear-gradient(180deg, #134e4a 0%, #064e3b 100%); border-radius: 0 0 40px 40px; }
        .prayer-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 25px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .active-prayer { background: #fbbf24; color: #064e3b; transform: scale(1.05); }
        .info-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .donation-btn { background: linear-gradient(90deg, #ca8a04, #eab308); transition: 0.3s; color: #000; font-weight: 900; }
        .donation-btn:active { transform: scale(0.95); }
        #compassCircle { transition: transform 0.2s ease-out; display: inline-block; }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-[450px] mx-auto min-h-screen">
        
        <header class="header-gradient p-6 text-center shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div class="text-right">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">توقيت القاهرة</p>
                    <p id="currentTime" class="text-sm font-black text-white"></p>
                </div>
                <i class="fas fa-mosque text-3xl text-yellow-500"></i>
                <div class="text-left">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">الهوية</p>
                    <p class="text-sm font-black text-white">أبا مالك العقيلي</p>
                </div>
            </div>

            <div class="bg-black/40 rounded-3xl p-4 border border-white/10">
                <div class="flex flex-col gap-2">
                    <div class="flex items-center justify-between bg-emerald-900/30 p-2 rounded-xl border border-emerald-500/20">
                        <span class="text-[10px] text-emerald-300 font-bold">التاريخ الهجري:</span>
                        <span id="hDateFull" class="text-md font-black text-yellow-500"></span>
                    </div>
                    <div class="flex items-center justify-between bg-white/5 p-2 rounded-xl border border-white/5">
                        <span class="text-[10px] text-gray-400 font-bold">التاريخ الميلادي:</span>
                        <span id="gDateFull" class="text-md font-black text-white"></span>
                    </div>
                </div>
            </div>
        </header>

        <main class="px-5 mt-6">
            <div class="bg-white rounded-[35px] p-6 shadow-2xl mb-8 text-black">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-black text-emerald-800">مواقيت الصلاة</h2>
                    <span class="text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold">القاهرة</span>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="prayer-card bg-emerald-50 p-3 text-center rounded-2xl border border-emerald-100">
                        <p class="text-[10px] text-emerald-600 font-bold">الفجر</p>
                        <p class="font-black text-lg">04:12</p>
                    </div>
                    <div class="prayer-card bg-emerald-50 p-3 text-center rounded-2xl border border-emerald-100 active-prayer shadow-lg">
                        <p class="text-[10px] font-bold">الظهر</p>
                        <p class="font-black text-lg">11:58</p>
                    </div>
                    <div class="prayer-card bg-emerald-50 p-3 text-center rounded-2xl border border-emerald-100">
                        <p class="text-[10px] text-emerald-600 font-bold">العصر</p>
                        <p class="font-black text-lg">03:32</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="initCompass()" class="bg-emerald-800/50 p-6 rounded-3xl border border-emerald-700 text-center shadow-lg active:scale-95 transition relative">
                    <div id="compassCircle">
                        <i class="fas fa-compass text-4xl text-yellow-400 mb-2"></i>
                    </div>
                    <p class="font-bold text-sm block">اتجاه القبلة</p>
                    <p id="dirStatus" class="text-[8px] text-emerald-300 mt-1 italic">اضغط للتفعيل</p>
                </button>

                <a href="https://quran.com/ar" target="_blank" class="bg-emerald-800/50 p-6 rounded-3xl border border-emerald-700 text-center shadow-lg active:scale-95 transition">
                    <i class="fas fa-book-quran text-4xl text-yellow-400 mb-2"></i>
                    <p class="font-bold text-sm">المصحف الكريم</p>
                    <p class="text-[8px] text-emerald-300 mt-1 italic">فتح المصحف</p>
                </a>
            </div>

            <section class="info-card rounded-[30px] p-6 mb-8 border-t-4 border-yellow-600">
                <div class="flex items-center gap-4 mb-4">
                    <div class="bg-yellow-600/20 p-3 rounded-2xl"><i class="fas fa-hand-holding-heart text-2xl text-yellow-500"></i></div>
                    <div>
                        <h2 class="text-lg font-black text-white">صدقة جارية</h2>
                        <p class="text-[10px] text-gray-400">ساهم في بناء بيوت الله</p>
                    </div>
                </div>
                <button class="donation-btn w-full py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2">
                    <i class="fas fa-heart"></i> تبرع الآن للمسجد
                </button>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#042f2e] p-4 flex justify-around border-t border-white/5 z-50">
            <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-home"></i><span class="text-[8px]">الرئيسية</span></a>
            <div class="flex flex-col items-center gap-1 text-yellow-500"><i class="fas fa-mosque"></i><span class="text-[8px]">المسجد</span></div>
        </nav>
    </div>

    <script>
        // تحديث الوقت والتواريخ
        function updateAllDates() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true});
            document.getElementById('gDateFull').innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
            document.getElementById('hDateFull').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', {day:'numeric', month:'long', year:'numeric'}).format(now);
        }
        updateAllDates();
        setInterval(updateAllDates, 1000);

        // تشغيل البوصلة
        let isCompassOn = false;
        function initCompass() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => { if(state === 'granted') startTracking(); });
            } else { startTracking(); }
        }
        function startTracking() {
            if (isCompassOn) return;
            window.addEventListener('deviceorientationabsolute', (e) => {
                let heading = e.alpha || e.webkitCompassHeading;
                if (heading) {
                    isCompassOn = true;
                    document.getElementById('compassCircle').style.transform = `rotate(${-heading}deg)`;
                    document.getElementById('dirStatus').innerText = "البوصلة تعمل";
                }
            }, true);
        }
    </script>
</body>
                          </html>
